<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Smartphone Bodycam</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 1.5rem; max-width: 400px; }
  h1 { margin-top: 0; font-size: 1.4rem; }
  .card { background: #1c1c1c; border-radius: 8px; padding: 1.25rem; margin-top: 2rem; }
  input[type="password"] {
    width: 100%; box-sizing: border-box; padding: 0.6rem; margin: 0.75rem 0;
    border-radius: 6px; border: 1px solid #444; background: #111; color: #eee; font-size: 1rem;
  }
  button {
    width: 100%; padding: 0.7rem; border: none; border-radius: 6px;
    background: #3a7afe; color: #fff; font-weight: bold; font-size: 1rem; cursor: pointer;
  }
  .error { color: #ff6b6b; font-size: 0.9rem; margin-top: 0.5rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔒 Smartphone Bodycam</h1>
    <form method="post" action="/login">
      <input type="password" name="password" placeholder="Password" autofocus required>
      <input type="hidden" name="next" id="next-field" value="">
      <button type="submit">Log in</button>
    </form>
    <p class="error" id="error-msg" style="display:none;">Incorrect password.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error")) {
      document.getElementById("error-msg").style.display = "block";
    }
    const next = params.get("next");
    if (next) {
      document.getElementById("next-field").value = next;
    }
  </script>
</body>
</html>
